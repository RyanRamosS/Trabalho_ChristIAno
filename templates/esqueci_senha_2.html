<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esqueci senha</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: red;
        color: white;
        font-family: Arial, sans-serif;

        width: 100%;
        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center; /* centraliza vertical */
        padding: 20px;
      }

      .container {
        width: 850%;
        max-width: 750px;
        background: transparent;
        padding: 100px 100px;
        border-radius: 12px;
        box-shadow:
          rgba(0, 0, 0, 0.25) 0px 54px 55px,
          rgba(0, 0, 0, 0.12) 0px -12px 30px,
          rgba(0, 0, 0, 0.12) 0px 4px 6px,
          rgba(0, 0, 0, 0.17) 0px 12px 13px,
          rgba(0, 0, 0, 0.09) 0px -3px 5px;
       
      }

      h1 {
        margin-bottom: 20px;
         text-align: center;
      }

      input {
        width: 100%;
        height: 45px;
        border-radius: 30px;
        border: 1px solid #ccc;
        padding: 20px;
        margin: 8px 0;
        font-size: 14px;
        outline: none;
      }
      input:focus {
        border-color: gold;
      }

      .texto {
        font-size: 12px;
        color: rgb(255, 255, 255);
        margin-bottom: 20px;
      }

      .button-24 {
        background: #ffd500;
        border: none;
        border-radius: 40px;
        color: #000000;
        cursor: pointer;

        width: 100%;
        margin-top: 15px;

        padding: 12px;
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s;
      }

      .button-24:hover {
        background-color: black;
        color: yellow;
        transition: 0.5s;
      }

      @media (max-width: 480px) {
        .container {
          padding: 20px;
        }
      }
      img {
        width: 30%;
    
      }
    </style>
  </head>

  <body>
    <div class="container">
     
      <h1>Esqueci a minha senha</h1>

      <strong>Nova senha</strong>
      <input type="password" placeholder="Digite a sua nova senha" />

      <p class="texto">
        *Mínimo de 8 caracteres, sendo no mínimo 1 letra maiúscula, 1 minúscula
        e 1 número
      </p>

      <strong>Confirmar nova senha</strong>
      <input type="password" placeholder="Confirmar nova senha" />

      <strong>Confirmar data de nascimento</strong>
      <input type="date" />

      <button class="button-24">Alterar Senha</button>
    </div>
  </body>
</html>
