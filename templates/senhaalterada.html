<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sucesso</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff0000, #8b0000);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 380px;
    }

    .card {
      background: #ffffff;
      border-radius: 25px;
      padding: 40px 25px;
      text-align: center;

      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    /* Ícone */
    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;

      border-radius: 50%;
      background: #ffd500;

      display: flex;
      align-items: center;
      justify-content: center;

      animation: pop 0.4s ease;
    }

    .success-icon svg {
      width: 40px;
      height: 40px;
      stroke: #000;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes pop {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #000;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;

      background: #ff0000;
      border: none;
      border-radius: 16px;

      padding: 15px;
      font-size: 16px;
      font-weight: 600;

      color: #fff;
      cursor: pointer;

      transition: 0.3s;
    }

    .btn:hover {
      background: #000;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .link {
      display: block;
      margin-top: 15px;
      font-size: 13px;
      color: #777;
      text-decoration: none;
    }

    .link:hover {
      color: #000;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="card">

      <div class="success-icon">
        <svg viewBox="0 0 24 24">
          <path d="M5 13l4 4L19 7"/>
        </svg>
      </div>

      <div class="title">Senha alterada!</div>
      <div class="subtitle">
        Sua senha foi atualizada com sucesso. Agora você já pode acessar sua conta.
      </div>
<a href="tela_login_csf.html">
    <button class="btn">Ir para login</button>
</a>
      

      <a href="cadastro.csf.html" class="link">Voltar para o início</a>

    </div>
  </div>
</body>
</html>
