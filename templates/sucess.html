<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="img/image-removebg-preview (12).png" type="image/x-icon">
<title>Cadastro Recebido - Compre sem fila</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
}

body {
  background: #f3f3f3;
}

/* HEADER */
   header {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1000;
        width: 100%;
        height: 70px;
        background-color: red;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: url("img/image-removebg-preview (13).png");
        background-repeat: no-repeat;
        background-position: center;
        background-size: 120px;
      }

/* CARD CENTRAL */
.container {
  max-width: 700px;
  margin: 80px auto 40px; /* espaço normal abaixo do header */
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 20px;
  padding: 40px 25px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  position: relative;
}

/* CONFETES (efeito leve) */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: radial-gradient(#4caf50 2px, transparent 2px),
                    radial-gradient(#e50914 2px, transparent 2px);
  background-size: 60px 60px;
  opacity: 0.1;
  border-radius: 20px;
}

/* CHECK */
.check {
  width: 120px;
  height: 120px;
  background: #4caf50;
  border-radius: 50%;
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
  color: white;
  position: relative;
  z-index: 2;
}

/* TITULO */
h2 {
  font-size: 32px;
  color: #1f7a4c;
  margin-bottom: 10px;
  position: relative;
  z-index: 2;
}

/* TEXTO */
.text {
  color: #666;
  font-size: 16px;
  margin-bottom: 25px;
  position: relative;
  z-index: 2;
}

/* ALERTA */
.alert {
  background: #e6f4ea;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 30px;
  display: flex;
  gap: 15px;
  align-items: center;
  text-align: left;
  position: relative;
  z-index: 2;
}

.alert-icon {
  background: #4caf50;
  color: white;
  width: 45px;
  height: 45px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.alert strong {
  color: #2e7d32;
  display: block;
}

.alert p {
  font-size: 14px;
  color: #555;
}

/* PASSOS */
.steps-title {
  margin: 20px 0;
  color: #2e7d32;
  font-weight: bold;
}

.steps {
  display: flex;
  justify-content: space-between;
  margin-bottom: 30px;
}

.step {
  width: 23%;
  text-align: center;
}

.step-icon {
  width: 60px;
  height: 60px;
  background: #e6f4ea;
  border-radius: 50%;
  margin: 0 auto 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.step p {
  font-size: 13px;
  color: #444;
}

/* BOTÃO */
.btn {
  width: 100%;
  padding: 18px;
  background: #e50914;
  color: white;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
  position: relative;
  z-index: 2;
}

.btn:hover {
  background: white;
  color: red;
}

/* RESPONSIVO */
@media(max-width:768px){
  .steps {
    flex-direction: column;
    gap: 15px;
  }

  .step {
    width: 100%;
  }
}
</style>
</head>

<body>

<header>
</header>

<div class="container">
  <div class="card">

    <div class="check">✔</div>

    <h2>Cadastro recebido com sucesso!</h2>

    <p class="text">
      Recebemos suas informações e já iniciamos o processo da sua loja.
    </p>

    <div class="alert">
      <div class="alert-icon">⏱</div>
      <div>
        <strong>Prazo de ativação</strong>
        <p>O processo pode levar até 15 dias, incluindo análise, cadastramento e treinamento.</p>
      </div>
    </div>

    <div class="steps-title">Próximos passos</div>

    <div class="steps">
      <div class="step">
        <div class="step-icon">🔍</div>
        <p><strong>Análise</strong></p>
      </div>

      <div class="step">
        <div class="step-icon">📝</div>
        <p><strong>Cadastramento</strong></p>
      </div>

      <div class="step">
        <div class="step-icon">🎓</div>
        <p><strong>Treinamento</strong></p>
      </div>

      <div class="step">
        <div class="step-icon">🏪</div>
        <p><strong>Loja ativa</strong></p>
      </div>
    </div>
  <a href="cadastro.csf.html">
    <button class="btn">Voltar para o início</button>
  </a>
    

  </div>
</div>

</body>
</html>
