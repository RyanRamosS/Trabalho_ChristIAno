<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="img/image-removebg-preview (12).png"
      type="image/x-icon"
    />

    <title>Cadastro Compre Sem Fila</title>

    <style>
      body {
        width: 100%;
        min-height: 100vh;
        background: white;
        display: flex;
        flex-direction: column;
        position: relative;
        font-family: Arial, sans-serif;
        overflow-y: auto;
      }

      header {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1000;
        width: 100%;
        height: 70px;
        background-color: red;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: url("img/image-removebg-preview (13).png");
        background-repeat: no-repeat;
        background-position: center;
        background-size: 120px;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 100px 20px 40px;
      }

      .img-box {
        width: 20%;
        max-width: 220px;
        position: relative;
        margin-bottom: 20px;
      }

      .img-box img {
        width: 100%;
        position: relative;
        z-index: 2;
      }

      .circle {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(255, 0, 0, 0.15), transparent);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
      }

      main p {
        color: #555;
        font-size: 18px;
        margin-bottom: 20px;
      }

      .mercado {
        font-size: clamp(28px, 5vw, 60px);
        color: black;
        margin: 5px;
      }

      .info:hover,
      .mercado:hover {
        color: red;
        transition: 0.3s;
      }

      .buttons {
        width: 80%;
        max-width: 450px;
        display: flex;
        gap: 15px;
        margin-top: 20px;
      }

      /* BOTÃO (AGORA FUNCIONA COM <a>) */
      .button-24 {
        flex: 1;
        padding: 18px;
        border-radius: 20px;
        font-size: 16px;
        font-weight: 800;
        background: #ff4742;
        color: white;
        text-decoration: none; /* remove sublinhado */
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        box-shadow: rgba(0, 0, 0, 0.1) 1px 2px 4px;
      }

      .button-24:hover {
        background: white;
        color: #ff4742;
        border: 1px solid #ff4742;
      }

      .button-24:active {
        opacity: 0.5;
      }

      .icon {
        position: absolute;
        right: 20px;
        font-size: 22px;
      }

      .decor-left {
        position: absolute;
        left: 20px;
        top: 150px;
        width: 80px;
        opacity: 0.2;
      }

      .decor-right {
        position: absolute;
        right: 20px;
        top: 250px;
        width: 80px;
        opacity: 0.2;
      }

      @media (max-width: 600px) {
        .buttons {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <img src="img/borrao.png" class="decor-left" />
    <img src="img/borrao.png" class="decor-right" />

    <header></header>

    <main>
      <div class="img-box">
        <div class="circle"></div>
        <img
          src="img/vista-lateral-vazia-do-carrinho-de-compras (1).png"
          alt=""
        />
      </div>

      <p class="mercado">
        <strong>Sua loja é um <br />supermercado?</strong>
      </p>

      <p class="info">
        <strong>
          Essa informação nos ajuda a personalizar <br />
          sua experiência
        </strong>
      </p>

      <div class="buttons">
        <a href="formsupermercado.html" class="button-24">
          Sim <span class="icon">›</span>
        </a>

        <a href="form.html" class="button-24">
          Não <span class="icon">›</span>
        </a>
      </div>
    </main>
  </body>
</html>
