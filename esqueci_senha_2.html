<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir senha</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        background: linear-gradient(135deg, #ff0000, #8b0000);
      }

      .container {
        width: 100%;
        max-width: 400px;

        background: white;
        color: black;

        padding: 40px 30px;
        border-radius: 15px;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      h1 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 22px;
      }

      label {
        font-size: 14px;
        font-weight: bold;
      }

      input {
        width: 100%;
        height: 45px;

        border-radius: 25px;
        border: 1px solid #ccc;

        padding: 0 15px;
        margin: 8px 0 15px;

        font-size: 14px;
        outline: none;

        transition: 0.3s;
      }

      input:focus {
        border-color: red;
        box-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
      }

      .texto {
        font-size: 12px;
        color: #666;
        margin-bottom: 15px;
      }

      /* BOTÃO (AGORA É UM <a>) */
      .button-24 {
        display: block;
        text-align: center;

        background: red;
        border-radius: 25px;

        color: white;
        text-decoration: none;

        width: 100%;
        padding: 12px;

        font-size: 16px;
        font-weight: bold;

        transition: 0.3s;
      }

      .button-24:hover {
        background: black;
      }

      @media (max-width: 480px) {
        .container {
          padding: 25px 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Redefinir senha</h1>

      <label>Nova senha</label>
      <input type="password" placeholder="Digite sua nova senha" />

      <p class="texto">
        * Mínimo de 8 caracteres, com 1 maiúscula, 1 minúscula e 1 número
      </p>

      <label>Confirmar nova senha</label>
      <input type="password" placeholder="Confirme sua senha" />

      <label>Data de nascimento</label>
      <input type="date" />

      <!-- BOTÃO CORRIGIDO -->
      <a href="senhaalterada.html" class="button-24">
        Alterar Senha
      </a>
    </div>
  </body>
</html>
