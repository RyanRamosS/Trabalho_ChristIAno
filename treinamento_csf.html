<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Treinamentos</title>

    <style>
      body {
        width: 100%;
        min-height: 100vh;
        background: white;
        display: flex;
        flex-direction: column;
        font-family: Arial, sans-serif;
      }

      header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 70px;
        background: red;

        background-image: url("img/image-removebg-preview (13).png");
        background-repeat: no-repeat;
        background-position: center;
        background-size: 120px;
      }

      main {
        padding: 100px 20px;
        text-align: center;
      }

      h1 {
        color: red;
        margin-bottom: 10px;
      }

      p {
        color: #555;
        margin-bottom: 30px;
      }

      /* 🎥 LISTA DE VIDEOS */
      .videos {
        display: flex;
        flex-direction: column;
        gap: 20px;
        max-width: 600px;
        margin: auto;
      }

      .video-card {
        background: whitesmoke;
        padding: 15px;
        border-radius: 20px;
        box-shadow: rgba(0,0,0,0.1) 0px 5px 15px;
        text-align: left;
      }

      .video-card iframe {
        width: 100%;
        height: 200px;
        border-radius: 15px;
      }

      .video-card h3 {
        margin-top: 10px;
        color: black;
      }

      .video-card p {
        font-size: 14px;
        color: #666;
      }

      .video-card:hover {
        transform: scale(1.02);
        transition: 0.3s;
      }
    </style>
  </head>

  <body>

    <header></header>

    <main>
      <h1>Treinamentos</h1>
      <p>Aprenda a usar a plataforma com nossos vídeos</p>

      <div class="videos">

        <div class="video-card">
          <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
          <h3>Como usar o sistema</h3>
          <p>Aprenda o básico da plataforma</p>
        </div>

        <div class="video-card">
          <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
          <h3>Cadastro de produtos</h3>
          <p>Como cadastrar corretamente</p>
        </div>

        <div class="video-card">
          <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
          <h3>Recebendo pedidos</h3>
          <p>Gerencie seus pedidos facilmente</p>
        </div>

      </div>
    </main>

  </body>
</html>
